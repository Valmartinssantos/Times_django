<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Times de Futebol</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #000000, #1a1a1a, #2b2b2b);
            color: #ffffff;
            min-height: 100vh;
        }

        .topo {
            background: linear-gradient(90deg, #000000, #111111, #222222);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 4px solid #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .topo h1 {
            font-size: 2.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .topo p {
            color: #d9d9d9;
            font-size: 1rem;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grade-times {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card-time {
            background: linear-gradient(180deg, #111111, #1b1b1b);
            border: 2px solid #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .card-time::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                #ffffff 0px,
                #ffffff 18px,
                #000000 18px,
                #000000 36px
            );
        }

        .card-time:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(255, 255, 255, 0.12);
        }

        .nome-time {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 18px;
            border-left: 5px solid #ffffff;
            padding-left: 12px;
            text-transform: uppercase;
        }

        .info {
            margin-bottom: 10px;
            font-size: 1rem;
            color: #e8e8e8;
        }

        .info strong {
            color: #ffffff;
        }

        .sem-times {
            background: #111111;
            border: 2px dashed #ffffff;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            font-size: 1.1rem;
            color: #d9d9d9;
        }

        .rodape {
            margin-top: 50px;
            text-align: center;
            padding: 20px;
            color: #cfcfcf;
            border-top: 2px solid rgba(255,255,255,0.2);
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            .topo h1 {
                font-size: 1.7rem;
            }

            .nome-time {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <header class="topo">
        <h1>Times de Futebol</h1>
    </header>

    <main class="container">
        {% if times %}
            <section class="grade-times">
                {% for time in times %}
                    <div class="card-time">
                        <h2 class="nome-time">{{ time.nome }}</h2>
                        <p class="info"><strong>Cidade:</strong> {{ time.cidade }}</p>
                        <p class="info"><strong>Estádio:</strong> {{ time.estadio }}</p>
                        <p class="info"><strong>Fundação:</strong> {{ time.fundacao }}</p>
                    </div>
                {% endfor %}
            </section>
        {% else %}
            <div class="sem-times">
                Nenhum time cadastrado no momento.
            </div>
        {% endif %}
    </main>

    <footer class="rodape">
    </footer>

</body>
</html>
